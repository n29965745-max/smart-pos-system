# ============================================================================
# DOCKER COMPOSE - Smart POS System
# Full stack deployment with database-per-tenant architecture
# ============================================================================

version: '3.8'

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  smart-pos-network:
    driver: bridge

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  backups:
    driver: local

# ============================================================================
# SERVICES
# ============================================================================
services:
  
  # ==========================================================================
  # POSTGRESQL DATABASE
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: smart-pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD}
      POSTGRES_DB: registry_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - smart-pos-network
    ports:
      - "5432:5432"  # Expose for development only, remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ADMIN_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=2621kB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"

  # ==========================================================================
  # REDIS CACHE & QUEUE
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: smart-pos-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - smart-pos-network
    ports:
      - "6379:6379"  # Expose for development only, remove in production
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # BACKEND API (Express.js + Prisma)
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: smart-pos-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Application
      NODE_ENV: production
      PORT: 5000
      
      # Database (Supabase or self-hosted PostgreSQL)
      DATABASE_URL: ${DATABASE_URL}
      
      # Redis (optional)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      
      # Security
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      
      # Supabase
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      
      # Application URLs
      BACKEND_URL: ${BACKEND_URL:-http://localhost:5000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://app.yourpos.com,http://localhost:3000}
      
      # SMS (optional)
      SMS_TEST_MODE: ${SMS_TEST_MODE:-true}
      SMS_PROVIDER: ${SMS_PROVIDER:-celcom}
      CELCOM_API_KEY: ${CELCOM_API_KEY:-}
      CELCOM_PARTNER_ID: ${CELCOM_PARTNER_ID:-}
      CELCOM_SENDER_ID: ${CELCOM_SENDER_ID:-}
      
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - smart-pos-network
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================================================
  # FRONTEND (Next.js)
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.yourpos.com}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.yourpos.com}
    container_name: smart-pos-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.yourpos.com}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.yourpos.com}
    networks:
      - smart-pos-network
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================================================
  # BACKUP SERVICE (Optional - runs daily)
  # ==========================================================================
  backup:
    image: postgres:16-alpine
    container_name: smart-pos-backup
    restart: "no"
    depends_on:
      - postgres
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${DB_ADMIN_USER:-postgres}
      PGPASSWORD: ${DB_ADMIN_PASSWORD}
    volumes:
      - backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    networks:
      - smart-pos-network
    entrypoint: ["/bin/sh", "/backup.sh"]
    profiles:
      - backup  # Only run when explicitly called

# ============================================================================
# HEALTHCHECK NOTES
# ============================================================================
# All services have health checks configured
# Use: docker-compose ps to see health status
# Use: docker-compose logs <service> to debug issues
