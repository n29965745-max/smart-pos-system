<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A2BE2;stop-opacity:1" />
    </linearGradient>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#iconGradient)" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Main icon: Ascending arrow with tech elements -->
  <!-- Left vertical line -->
  <line x1="35" y1="65" x2="35" y2="35" stroke="url(#iconGradient)" stroke-width="2.5" stroke-linecap="round" filter="url(#iconShadow)"/>
  
  <!-- Right vertical line -->
  <line x1="65" y1="65" x2="65" y2="35" stroke="url(#iconGradient)" stroke-width="2.5" stroke-linecap="round" filter="url(#iconShadow)"/>
  
  <!-- Connecting horizontal line at top -->
  <line x1="35" y1="35" x2="65" y2="35" stroke="url(#iconGradient)" stroke-width="2.5" stroke-linecap="round" filter="url(#iconShadow)"/>
  
  <!-- Arrow pointing up (growth indicator) -->
  <g filter="url(#iconShadow)">
    <line x1="50" y1="25" x2="50" y2="10" stroke="url(#iconGradient)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arrow head -->
    <line x1="50" y1="10" x2="43" y2="20" stroke="url(#iconGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="50" y1="10" x2="57" y2="20" stroke="url(#iconGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Tech dots (nodes) -->
  <circle cx="35" cy="50" r="2.5" fill="url(#iconGradient)" filter="url(#iconGlow)"/>
  <circle cx="50" cy="50" r="2.5" fill="url(#iconGradient)" filter="url(#iconGlow)"/>
  <circle cx="65" cy="50" r="2.5" fill="url(#iconGradient)" filter="url(#iconGlow)"/>
  
  <!-- Bottom accent line -->
  <line x1="30" y1="72" x2="70" y2="72" stroke="url(#iconGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Corner accents -->
  <circle cx="32" cy="32" r="1.2" fill="#007BFF" opacity="0.4"/>
  <circle cx="68" cy="32" r="1.2" fill="#8A2BE2" opacity="0.4"/>
  <circle cx="32" cy="68" r="1.2" fill="#8A2BE2" opacity="0.4"/>
  <circle cx="68" cy="68" r="1.2" fill="#007BFF" opacity="0.4"/>
</svg>
