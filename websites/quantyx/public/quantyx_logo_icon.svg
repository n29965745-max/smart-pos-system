<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A2BE2;stop-opacity:1" />
    </linearGradient>
    
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle (optional, can be removed) -->
  <circle cx="50" cy="50" r="48" fill="#f8f9fa" stroke="url(#iconGradient)" stroke-width="1" opacity="0.1"/>
  
  <!-- Outer geometric circle -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#iconGradient)" stroke-width="2.5" opacity="0.3"/>
  
  <!-- Inner geometric circle -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="url(#iconGradient)" stroke-width="2" opacity="0.5"/>
  
  <!-- Network nodes (corners of a square) -->
  <circle cx="28" cy="28" r="4" fill="#007BFF" filter="url(#iconGlow)"/>
  <circle cx="72" cy="28" r="4" fill="#8A2BE2" filter="url(#iconGlow)"/>
  <circle cx="72" cy="72" r="4" fill="#007BFF" filter="url(#iconGlow)"/>
  <circle cx="28" cy="72" r="4" fill="#8A2BE2" filter="url(#iconGlow)"/>
  
  <!-- Connection lines (network) -->
  <line x1="28" y1="28" x2="72" y2="28" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
  <line x1="72" y1="28" x2="72" y2="72" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
  <line x1="72" y1="72" x2="28" y2="72" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
  <line x1="28" y1="72" x2="28" y2="28" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
  
  <!-- Diagonal connections (digital pulse) -->
  <line x1="28" y1="28" x2="72" y2="72" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="72" y1="28" x2="28" y2="72" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  
  <!-- Center pulse point -->
  <circle cx="50" cy="50" r="6" fill="url(#iconGradient)" filter="url(#iconGlow)"/>
  <circle cx="50" cy="50" r="3.5" fill="#ffffff" opacity="0.9"/>
  
  <!-- Animated pulse rings (optional CSS animation) -->
  <circle cx="50" cy="50" r="6" fill="none" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.2">
    <animate attributeName="r" from="6" to="20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.6" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
