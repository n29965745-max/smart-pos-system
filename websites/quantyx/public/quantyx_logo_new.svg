<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A2BE2;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle for depth -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#mainGradient)" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Main icon: Ascending arrow with tech elements -->
  <!-- Left vertical line -->
  <line x1="70" y1="130" x2="70" y2="70" stroke="url(#mainGradient)" stroke-width="3" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Right vertical line -->
  <line x1="130" y1="130" x2="130" y2="70" stroke="url(#mainGradient)" stroke-width="3" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Connecting horizontal line at top -->
  <line x1="70" y1="70" x2="130" y2="70" stroke="url(#mainGradient)" stroke-width="3" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Arrow pointing up (growth indicator) -->
  <g filter="url(#shadow)">
    <line x1="100" y1="50" x2="100" y2="20" stroke="url(#mainGradient)" stroke-width="3" stroke-linecap="round"/>
    <!-- Arrow head -->
    <line x1="100" y1="20" x2="90" y2="35" stroke="url(#mainGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="100" y1="20" x2="110" y2="35" stroke="url(#mainGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Tech dots (nodes) -->
  <circle cx="70" cy="100" r="4" fill="url(#mainGradient)" filter="url(#softGlow)"/>
  <circle cx="100" cy="100" r="4" fill="url(#mainGradient)" filter="url(#softGlow)"/>
  <circle cx="130" cy="100" r="4" fill="url(#mainGradient)" filter="url(#softGlow)"/>
  
  <!-- Bottom accent line (represents foundation/stability) -->
  <line x1="60" y1="145" x2="140" y2="145" stroke="url(#mainGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Subtle corner accents for tech feel -->
  <circle cx="65" cy="65" r="2" fill="#007BFF" opacity="0.4"/>
  <circle cx="135" cy="65" r="2" fill="#8A2BE2" opacity="0.4"/>
  <circle cx="65" cy="135" r="2" fill="#8A2BE2" opacity="0.4"/>
  <circle cx="135" cy="135" r="2" fill="#007BFF" opacity="0.4"/>
</svg>
