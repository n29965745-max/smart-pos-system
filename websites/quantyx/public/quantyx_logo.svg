<svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A2BE2;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon: Digital Pulse with Network Nodes -->
  <g id="icon">
    <!-- Outer geometric circle -->
    <circle cx="35" cy="35" r="28" fill="none" stroke="url(#logoGradient)" stroke-width="2" opacity="0.3"/>
    
    <!-- Inner geometric circle -->
    <circle cx="35" cy="35" r="20" fill="none" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Network nodes (corners of a square) -->
    <circle cx="20" cy="20" r="3" fill="#007BFF" filter="url(#glow)"/>
    <circle cx="50" cy="20" r="3" fill="#8A2BE2" filter="url(#glow)"/>
    <circle cx="50" cy="50" r="3" fill="#007BFF" filter="url(#glow)"/>
    <circle cx="20" cy="50" r="3" fill="#8A2BE2" filter="url(#glow)"/>
    
    <!-- Connection lines (network) -->
    <line x1="20" y1="20" x2="50" y2="20" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="50" y1="20" x2="50" y2="50" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="50" y1="50" x2="20" y2="50" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="20" y1="50" x2="20" y2="20" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Diagonal connections (digital pulse) -->
    <line x1="20" y1="20" x2="50" y2="50" stroke="url(#logoGradient)" stroke-width="1" opacity="0.4" stroke-dasharray="3,2"/>
    <line x1="50" y1="20" x2="20" y2="50" stroke="url(#logoGradient)" stroke-width="1" opacity="0.4" stroke-dasharray="3,2"/>
    
    <!-- Center pulse point -->
    <circle cx="35" cy="35" r="4" fill="url(#logoGradient)" filter="url(#glow)"/>
    <circle cx="35" cy="35" r="2.5" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- QX Monogram -->
  <g id="monogram" transform="translate(75, 15)">
    <!-- Q -->
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#222222" letter-spacing="-2">Q</text>
    
    <!-- X -->
    <text x="28" y="35" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="url(#logoGradient)" letter-spacing="-2">X</text>
  </g>
  
  <!-- Company Name -->
  <g id="company-name">
    <text x="75" y="65" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#222222" letter-spacing="0.5">QuantyX</text>
  </g>
  
  <!-- Tagline -->
  <g id="tagline">
    <text x="75" y="82" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#007BFF" letter-spacing="1.5">INNOVATE.BUILD.SCALE.</text>
  </g>
</svg>
