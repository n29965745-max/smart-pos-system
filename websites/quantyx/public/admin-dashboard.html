<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - QuantyX Contact Submissions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Roboto', sans-serif;
            background: #2a2a2a;
            color: #FFFFFF;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, #007BFF, #8A2BE2);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            background: #007BFF;
            color: #FFFFFF;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover {
            background: #0056B3;
            transform: translateY(-2px);
        }

        button.danger {
            background: #e74c3c;
        }

        button.danger:hover {
            background: #c0392b;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #007BFF;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #999;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 900;
            color: #007BFF;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #0f0f0f;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 700;
            color: #007BFF;
            border-bottom: 2px solid #333;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        tr:hover {
            background: #2a2a2a;
        }

        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status.new {
            background: #3498db;
            color: #FFFFFF;
        }

        .status.replied {
            background: #27ae60;
            color: #FFFFFF;
        }

        .status.pending {
            background: #f39c12;
            color: #FFFFFF;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .actions button {
            padding: 5px 10px;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid #007BFF;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #007BFF;
        }

        .modal-content p {
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .modal-content strong {
            color: #007BFF;
        }

        .modal-footer {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .error {
            background: #e74c3c;
            color: #FFFFFF;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .success {
            background: #27ae60;
            color: #FFFFFF;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }

            .actions {
                flex-direction: column;
            }

            .actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📧 Contact Submissions Dashboard</h1>
            <p>QuantyX Digital Technologies - Admin Panel</p>
        </header>

        <div id="message"></div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Submissions</h3>
                <div class="number" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>New Messages</h3>
                <div class="number" id="newCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Replied</h3>
                <div class="number" id="repliedCount">0</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="loadContacts()">🔄 Refresh</button>
            <button onclick="exportCSV()">📥 Export CSV</button>
            <button class="danger" onclick="deleteAllContacts()">🗑️ Delete All</button>
        </div>

        <div id="loading" class="loading" style="display: none;">Loading submissions...</div>
        <div id="tableContainer"></div>
    </div>

    <!-- View Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <h2>Message Details</h2>
            <div id="modalBody"></div>
            <div class="modal-footer">
                <button onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Load contacts on page load
        document.addEventListener('DOMContentLoaded', loadContacts);

        async function loadContacts() {
            const loading = document.getElementById('loading');
            const tableContainer = document.getElementById('tableContainer');
            
            loading.style.display = 'block';
            tableContainer.innerHTML = '';

            try {
                const response = await fetch('/api/contacts');
                const data = await response.json();

                loading.style.display = 'none';

                if (!data.success || !data.data || data.data.length === 0) {
                    tableContainer.innerHTML = '<div class="empty">No submissions yet</div>';
                    updateStats([]);
                    return;
                }

                updateStats(data.data);
                renderTable(data.data);
            } catch (error) {
                loading.style.display = 'none';
                showMessage('Error loading submissions: ' + error.message, 'error');
            }
        }

        function updateStats(contacts) {
            const total = contacts.length;
            const newCount = contacts.filter(c => c.status === 'new').length;
            const repliedCount = contacts.filter(c => c.status === 'replied').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('newCount').textContent = newCount;
            document.getElementById('repliedCount').textContent = repliedCount;
        }

        function renderTable(contacts) {
            const tableContainer = document.getElementById('tableContainer');
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Subject</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            contacts.forEach(contact => {
                const date = new Date(contact.created_at).toLocaleDateString();
                const statusClass = contact.status || 'new';
                
                html += `
                    <tr>
                        <td>${date}</td>
                        <td>${contact.name}</td>
                        <td>${contact.email}</td>
                        <td>${contact.subject}</td>
                        <td><span class="status ${statusClass}">${contact.status || 'new'}</span></td>
                        <td>
                            <div class="actions">
                                <button onclick="viewContact(${contact.id})">👁️ View</button>
                                <button onclick="markReplied(${contact.id})">✓ Replied</button>
                                <button class="danger" onclick="deleteContact(${contact.id})">🗑️ Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            tableContainer.innerHTML = html;
        }

        async function viewContact(id) {
            try {
                const response = await fetch(`/contacts/${id}`);
                const data = await response.json();

                if (data.success) {
                    const contact = data.data;
                    const date = new Date(contact.created_at).toLocaleString();
                    
                    document.getElementById('modalBody').innerHTML = `
                        <p><strong>Name:</strong> ${contact.name}</p>
                        <p><strong>Email:</strong> <a href="mailto:${contact.email}">${contact.email}</a></p>
                        <p><strong>Subject:</strong> ${contact.subject}</p>
                        <p><strong>Date:</strong> ${date}</p>
                        <p><strong>Status:</strong> <span class="status ${contact.status || 'new'}">${contact.status || 'new'}</span></p>
                        <p><strong>Message:</strong></p>
                        <p style="background: #0f0f0f; padding: 15px; border-radius: 5px; white-space: pre-wrap;">${contact.message}</p>
                    `;
                    
                    document.getElementById('viewModal').classList.add('show');
                }
            } catch (error) {
                showMessage('Error loading contact: ' + error.message, 'error');
            }
        }

        function closeModal() {
            document.getElementById('viewModal').classList.remove('show');
        }

        async function markReplied(id) {
            try {
                const response = await fetch(`/contacts/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'replied' })
                });
                const data = await response.json();

                if (data.success) {
                    showMessage('Status updated to Replied', 'success');
                    loadContacts();
                }
            } catch (error) {
                showMessage('Error updating status: ' + error.message, 'error');
            }
        }

        async function deleteContact(id) {
            if (!confirm('Are you sure you want to delete this contact?')) return;

            try {
                const response = await fetch(`/contacts/${id}`, { method: 'DELETE' });
                const data = await response.json();

                if (data.success) {
                    showMessage('Contact deleted', 'success');
                    loadContacts();
                }
            } catch (error) {
                showMessage('Error deleting contact: ' + error.message, 'error');
            }
        }

        async function deleteAllContacts() {
            if (!confirm('Are you sure you want to delete ALL contacts? This cannot be undone!')) return;

            try {
                const response = await fetch('/api/contacts');
                const data = await response.json();

                if (data.success && data.data) {
                    for (const contact of data.data) {
                        await fetch(`/contacts/${contact.id}`, { method: 'DELETE' });
                    }
                    showMessage('All contacts deleted', 'success');
                    loadContacts();
                }
            } catch (error) {
                showMessage('Error deleting contacts: ' + error.message, 'error');
            }
        }

        function exportCSV() {
            fetch('/api/contacts')
                .then(r => r.json())
                .then(data => {
                    if (!data.data || data.data.length === 0) {
                        alert('No contacts to export');
                        return;
                    }

                    let csv = 'Date,Name,Email,Subject,Status,Message\n';
                    data.data.forEach(contact => {
                        const date = new Date(contact.created_at).toLocaleString();
                        const message = contact.message.replace(/"/g, '""');
                        csv += `"${date}","${contact.name}","${contact.email}","${contact.subject}","${contact.status || 'new'}","${message}"\n`;
                    });

                    const blob = new Blob([csv], { type: 'text/csv' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `quantyx-contacts-${new Date().toISOString().split('T')[0]}.csv`;
                    a.click();
                    window.URL.revokeObjectURL(url);
                })
                .catch(error => showMessage('Error exporting: ' + error.message, 'error'));
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="${type}">${msg}</div>`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 5000);
        }

        // Close modal when clicking outside
        document.getElementById('viewModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
