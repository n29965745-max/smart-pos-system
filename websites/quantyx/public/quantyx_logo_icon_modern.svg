<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glowing effects -->
    <filter id="glow-icon">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-intense-icon">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="neon-blue-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007BFF;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="dark-bg-icon">
      <stop offset="0%" style="stop-color:#1a1f3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e27;stop-opacity:1" />
    </radialGradient>

    <!-- Animation -->
    <style>
      @keyframes pulse-glow-icon {
        0%, 100% { filter: drop-shadow(0 0 3px #00D9FF); }
        50% { filter: drop-shadow(0 0 6px #00D9FF); }
      }
      
      .pulse-icon {
        animation: pulse-glow-icon 2s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Dark background -->
  <circle cx="60" cy="60" r="60" fill="url(#dark-bg-icon)"/>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.3"/>

  <!-- Q - Left side -->
  <g class="pulse-icon">
    <circle cx="40" cy="60" r="18" fill="none" stroke="url(#neon-blue-icon)" stroke-width="2" filter="url(#glow-icon)"/>
    <path d="M 52 72 Q 58 76 54 85" fill="none" stroke="url(#neon-blue-icon)" stroke-width="2" stroke-linecap="round" filter="url(#glow-icon)"/>
    <circle cx="40" cy="60" r="3" fill="url(#neon-blue-icon)" filter="url(#glow-intense-icon)"/>
  </g>

  <!-- X - Right side -->
  <g class="pulse-icon" style="animation-delay: 0.3s;">
    <line x1="75" y1="45" x2="95" y2="65" stroke="url(#neon-blue-icon)" stroke-width="2" stroke-linecap="round" filter="url(#glow-icon)"/>
    <line x1="95" y1="45" x2="75" y2="65" stroke="url(#neon-blue-icon)" stroke-width="2" stroke-linecap="round" filter="url(#glow-icon)"/>
    <circle cx="85" cy="55" r="2.5" fill="url(#neon-blue-icon)" filter="url(#glow-intense-icon)"/>
  </g>

  <!-- Neural network nodes -->
  <g opacity="0.5">
    <!-- Top -->
    <circle cx="60" cy="25" r="1.5" fill="#00D9FF" filter="url(#glow-icon)"/>
    <line x1="60" y1="26.5" x2="60" y2="35" stroke="#00D9FF" stroke-width="0.8" opacity="0.4"/>
    
    <!-- Bottom -->
    <circle cx="60" cy="95" r="1.5" fill="#00D9FF" filter="url(#glow-icon)"/>
    <line x1="60" y1="93.5" x2="60" y2="85" stroke="#00D9FF" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Connecting circuit lines -->
  <line x1="52" y1="55" x2="68" y2="50" stroke="#00D9FF" stroke-width="0.8" opacity="0.3" stroke-dasharray="2,1"/>
  <line x1="52" y1="65" x2="68" y2="60" stroke="#00D9FF" stroke-width="0.8" opacity="0.3" stroke-dasharray="2,1"/>

  <!-- Corner accents -->
  <g stroke="#00D9FF" stroke-width="1" opacity="0.4">
    <line x1="15" y1="15" x2="25" y2="15"/>
    <line x1="15" y1="15" x2="15" y2="25"/>
    
    <line x1="105" y1="15" x2="95" y2="15"/>
    <line x1="105" y1="15" x2="105" y2="25"/>
    
    <line x1="15" y1="105" x2="25" y2="105"/>
    <line x1="15" y1="105" x2="15" y2="95"/>
    
    <line x1="105" y1="105" x2="95" y2="105"/>
    <line x1="105" y1="105" x2="105" y2="95"/>
  </g>
</svg>
