<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glowing effects -->
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glow-intense">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="neon-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007BFF;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="dark-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>

    <!-- Animation -->
    <style>
      @keyframes pulse-glow {
        0%, 100% { filter: drop-shadow(0 0 4px #00D9FF); }
        50% { filter: drop-shadow(0 0 8px #00D9FF); }
      }
      
      @keyframes circuit-flow {
        0% { stroke-dashoffset: 100; }
        100% { stroke-dashoffset: 0; }
      }
      
      .pulse-element {
        animation: pulse-glow 2s ease-in-out infinite;
      }
      
      .circuit-line {
        stroke-dasharray: 100;
        animation: circuit-flow 3s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="200" height="200" fill="url(#dark-bg)"/>

  <!-- Outer geometric frame -->
  <rect x="20" y="20" width="160" height="160" fill="none" stroke="#00D9FF" stroke-width="1.5" opacity="0.3" rx="8"/>

  <!-- Inner circuit pattern - top left -->
  <line x1="40" y1="40" x2="60" y2="40" stroke="#00D9FF" stroke-width="1" opacity="0.4" class="circuit-line"/>
  <line x1="60" y1="40" x2="60" y2="55" stroke="#00D9FF" stroke-width="1" opacity="0.4" class="circuit-line"/>
  <circle cx="60" cy="55" r="2" fill="#00D9FF" opacity="0.5"/>

  <!-- Inner circuit pattern - top right -->
  <line x1="140" y1="40" x2="160" y2="40" stroke="#00D9FF" stroke-width="1" opacity="0.4" class="circuit-line"/>
  <line x1="140" y1="40" x2="140" y2="55" stroke="#00D9FF" stroke-width="1" opacity="0.4" class="circuit-line"/>
  <circle cx="140" cy="55" r="2" fill="#00D9FF" opacity="0.5"/>

  <!-- Inner circuit pattern - bottom left -->
  <line x1="40" y1="160" x2="60" y2="160" stroke="#00D9FF" stroke-width="1" opacity="0.4" class="circuit-line"/>
  <line x1="60" y1="145" x2="60" y2="160" stroke="#00D9FF" stroke-width="1" opacity="0.4" class="circuit-line"/>
  <circle cx="60" cy="145" r="2" fill="#00D9FF" opacity="0.5"/>

  <!-- Inner circuit pattern - bottom right -->
  <line x1="140" y1="160" x2="160" y2="160" stroke="#00D9FF" stroke-width="1" opacity="0.4" class="circuit-line"/>
  <line x1="140" y1="145" x2="140" y2="160" stroke="#00D9FF" stroke-width="1" opacity="0.4" class="circuit-line"/>
  <circle cx="140" cy="145" r="2" fill="#00D9FF" opacity="0.5"/>

  <!-- Central geometric shape - Q inspired -->
  <g class="pulse-element">
    <!-- Q circle -->
    <circle cx="85" cy="100" r="35" fill="none" stroke="url(#neon-blue)" stroke-width="2.5" filter="url(#glow-blue)"/>
    
    <!-- Q tail -->
    <path d="M 110 125 Q 120 130 115 145" fill="none" stroke="url(#neon-blue)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow-blue)"/>
    
    <!-- Q center dot -->
    <circle cx="85" cy="100" r="4" fill="url(#neon-blue)" filter="url(#glow-intense)"/>
  </g>

  <!-- X shape - geometric and glowing -->
  <g class="pulse-element" style="animation-delay: 0.3s;">
    <!-- X lines with sharp angles -->
    <line x1="130" y1="75" x2="155" y2="100" stroke="url(#neon-blue)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow-blue)"/>
    <line x1="155" y1="75" x2="130" y2="100" stroke="url(#neon-blue)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow-blue)"/>
    
    <!-- X center intersection point -->
    <circle cx="142.5" cy="87.5" r="3.5" fill="url(#neon-blue)" filter="url(#glow-intense)"/>
  </g>

  <!-- AI-inspired neural nodes -->
  <g opacity="0.6">
    <!-- Top node -->
    <circle cx="100" cy="50" r="2.5" fill="#00D9FF" filter="url(#glow-blue)"/>
    <line x1="100" y1="52.5" x2="100" y2="65" stroke="#00D9FF" stroke-width="1" opacity="0.5"/>
    
    <!-- Left node -->
    <circle cx="60" cy="100" r="2.5" fill="#00D9FF" filter="url(#glow-blue)"/>
    <line x1="62.5" y1="100" x2="75" y2="100" stroke="#00D9FF" stroke-width="1" opacity="0.5"/>
    
    <!-- Right node -->
    <circle cx="140" cy="100" r="2.5" fill="#00D9FF" filter="url(#glow-blue)"/>
    <line x1="137.5" y1="100" x2="125" y2="100" stroke="#00D9FF" stroke-width="1" opacity="0.5"/>
    
    <!-- Bottom node -->
    <circle cx="100" cy="150" r="2.5" fill="#00D9FF" filter="url(#glow-blue)"/>
    <line x1="100" y1="147.5" x2="100" y2="135" stroke="#00D9FF" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Connecting lines between Q and X -->
  <line x1="115" y1="90" x2="130" y2="80" stroke="#00D9FF" stroke-width="1" opacity="0.3" stroke-dasharray="3,2"/>
  <line x1="115" y1="110" x2="130" y2="95" stroke="#00D9FF" stroke-width="1" opacity="0.3" stroke-dasharray="3,2"/>

  <!-- Corner accent marks -->
  <g stroke="#00D9FF" stroke-width="1.5" opacity="0.5">
    <!-- Top left corner -->
    <line x1="30" y1="30" x2="45" y2="30"/>
    <line x1="30" y1="30" x2="30" y2="45"/>
    
    <!-- Top right corner -->
    <line x1="170" y1="30" x2="155" y2="30"/>
    <line x1="170" y1="30" x2="170" y2="45"/>
    
    <!-- Bottom left corner -->
    <line x1="30" y1="170" x2="45" y2="170"/>
    <line x1="30" y1="170" x2="30" y2="155"/>
    
    <!-- Bottom right corner -->
    <line x1="170" y1="170" x2="155" y2="170"/>
    <line x1="170" y1="170" x2="170" y2="155"/>
  </g>

  <!-- Subtle AI circuit symbol in center -->
  <g opacity="0.4">
    <path d="M 95 95 L 105 95 L 105 105 L 95 105 Z" fill="none" stroke="#00D9FF" stroke-width="0.8"/>
    <circle cx="100" cy="100" r="1.5" fill="#00D9FF"/>
  </g>
</svg>
